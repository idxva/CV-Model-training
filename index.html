<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CV — teach your camera</title>
<style>
  :root{
    --ink:#1c1b19;
    --paper:#faf8f4;
    --card:#ffffff;
    --line:#e4e0d8;
    --accent:#3d5a4c;
    --accent-dim:#e8efe9;
    --warn:#a8452f;
    --warn-dim:#f7e9e5;
    --muted:#8a8579;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:16px 16px 48px;
  }
  header{
    padding:18px 4px 14px;
  }
  header h1{
    font-size:20px;
    font-weight:700;
    margin:0 0 2px;
    letter-spacing:-0.01em;
  }
  header p{
    margin:0;
    font-size:13px;
    color:var(--muted);
  }
  .stage{
    position:relative;
    background:#000;
    border-radius:14px;
    overflow:hidden;
    aspect-ratio: 3/4;
    box-shadow: 0 1px 0 var(--line);
  }
  video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transform: scaleX(-1);
  }
  video.rear{ transform:none; }
  .stage-overlay{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    pointer-events:none;
  }
  .predict-pill{
    pointer-events:auto;
    background:rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    color:#fff;
    padding:10px 14px;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    min-width:120px;
    display:none;
  }
  .predict-pill.show{ display:block; }
  .predict-pill .conf{
    display:block;
    font-size:12px;
    font-weight:400;
    color:rgba(255,255,255,0.75);
    margin-top:2px;
  }
  .cam-flip{
    pointer-events:auto;
    background:rgba(0,0,0,0.5);
    color:#fff;
    border:none;
    width:40px; height:40px;
    border-radius:50%;
    font-size:17px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .status-line{
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    padding:10px 4px 0;
    min-height:18px;
  }
  section{
    margin-top:22px;
  }
  h2{
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    margin:0 0 10px;
  }
  .add-row{
    display:flex;
    gap:8px;
  }
  input[type=text]{
    flex:1;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    background:var(--card);
    color:var(--ink);
  }
  input[type=text]:focus{
    outline:none;
    border-color:var(--accent);
  }
  button{
    font-family:inherit;
    cursor:pointer;
  }
  .capture-btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:0 18px;
    border-radius:10px;
    font-size:14.5px;
    font-weight:600;
    white-space:nowrap;
    user-select:none;
    position:relative;
    overflow:hidden;
  }
  .capture-btn:active{ transform: scale(0.97); }
  .capture-btn:disabled{ opacity:0.4; }
  .hint{
    font-size:12px;
    color:var(--muted);
    margin:8px 2px 0;
  }
  .classes{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .class-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
  }
  .class-row .name{
    flex:1;
    font-size:14.5px;
    font-weight:600;
  }
  .class-row .count{
    font-size:12.5px;
    color:var(--muted);
    background:var(--accent-dim);
    color:var(--accent);
    padding:2px 8px;
    border-radius:20px;
    font-weight:600;
  }
  .class-row .del{
    background:none;
    border:none;
    color:var(--warn);
    font-size:13px;
    padding:4px 6px;
  }
  .empty{
    font-size:13px;
    color:var(--muted);
    text-align:center;
    padding:14px;
    border:1px dashed var(--line);
    border-radius:10px;
  }
  .run-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:15.5px;
    font-weight:700;
    background:var(--ink);
    color:#fff;
    margin-top:16px;
  }
  .run-btn.active{
    background:var(--warn);
  }
  .run-btn:disabled{
    opacity:0.35;
  }
  .footer-row{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .ghost-btn{
    flex:1;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--ink);
    padding:11px;
    border-radius:10px;
    font-size:13.5px;
    font-weight:600;
  }
  .loading-screen{
    position:fixed;
    inset:0;
    background:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:10px;
    z-index:50;
  }
  .loading-screen .dot{
    width:8px;height:8px;border-radius:50%;background:var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:0.25} 50%{opacity:1} }
  .loading-screen p{ font-size:13.5px; color:var(--muted); }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="dot"></div>
  <p id="loadingText">Loading vision model…</p>
</div>

<div class="wrap">
  <header>
    <h1>CV(trial)</h1>
    <p>Machine learning for object recognition</p>
  </header>

  <div class="stage">
    <video id="webcam" autoplay playsinline muted></video>
    <div class="stage-overlay">
      <div class="predict-pill" id="predictPill">
        <span id="predictLabel">—</span>
        <span class="conf" id="predictConf"></span>
      </div>
      <button class="cam-flip" id="flipCam" aria-label="Flip camera">⟳</button>
    </div>
  </div>
  <div class="status-line" id="statusLine"></div>

  <section>
    <h2>Teach it a label</h2>
    <div class="add-row">
      <input type="text" id="labelInput" placeholder="e.g. water bottle" autocomplete="off">
      <button class="capture-btn" id="addBtn" disabled>Hold to capture</button>
    </div>
    <p class="hint">Press and hold the button while showing the object from a few angles — it grabs several frames automatically.</p>
  </section>

  <section>
    <h2>Labels trained</h2>
    <div class="classes" id="classList">
      <div class="empty">No labels yet. Add your first one above.</div>
    </div>
  </section>

  <button class="run-btn" id="runBtn" disabled>Start recognizing</button>

  <div class="footer-row">
    <button class="ghost-btn" id="exportBtn">Export training data</button>
    <button class="ghost-btn" id="importBtnLabel">Import training data</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6/dist/knn-classifier.min.js"></script>

<script>
(function(){
  const videoEl = document.getElementById('webcam');
  const loadingScreen = document.getElementById('loadingScreen');
  const loadingText = document.getElementById('loadingText');
  const statusLine = document.getElementById('statusLine');
  const labelInput = document.getElementById('labelInput');
  const addBtn = document.getElementById('addBtn');
  const classList = document.getElementById('classList');
  const runBtn = document.getElementById('runBtn');
  const flipCam = document.getElementById('flipCam');
  const predictPill = document.getElementById('predictPill');
  const predictLabel = document.getElementById('predictLabel');
  const predictConf = document.getElementById('predictConf');
  const exportBtn = document.getElementById('exportBtn');
  const importBtnLabel = document.getElementById('importBtnLabel');
  const importFile = document.getElementById('importFile');

  let mobilenetModel = null;
  let classifier = null;
  let currentFacing = 'user';
  let stream = null;
  let capturing = false;
  let captureTimer = null;
  let running = false;
  let runTimer = null;
  const CONFIDENCE_THRESHOLD = 0.55;

  const counts = {}; // label -> count

  function setStatus(msg){ statusLine.textContent = msg || ''; }

  async function startCamera(facing){
    if(stream){
      stream.getTracks().forEach(t => t.stop());
    }
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width:{ideal:640}, height:{ideal:480} },
        audio:false
      });
      videoEl.srcObject = stream;
      videoEl.classList.toggle('rear', facing === 'environment');
      currentFacing = facing;
      await new Promise(res => { videoEl.onloadedmetadata = res; });
    }catch(err){
      setStatus('Camera access failed — check permissions.');
      console.error(err);
    }
  }

  async function init(){
    await startCamera('user');
    loadingText.textContent = 'Loading vision model…';
    mobilenetModel = await mobilenet.load();
    classifier = knnClassifier.create();
    loadingScreen.style.display = 'none';
    addBtn.disabled = false;
    setStatus('Ready. Add a label to get started.');
  }

  function getEmbedding(){
    return tf.tidy(() => {
      const img = tf.browser.fromPixels(videoEl);
      return mobilenetModel.infer(img, true);
    });
  }

  function renderClassList(){
    const labels = Object.keys(counts).filter(l => counts[l] > 0);
    if(labels.length === 0){
      classList.innerHTML = '<div class="empty">No labels yet. Add your first one above.</div>';
      runBtn.disabled = true;
      return;
    }
    classList.innerHTML = '';
    labels.forEach(label => {
      const row = document.createElement('div');
      row.className = 'class-row';
      row.innerHTML = `
        <span class="name">${escapeHtml(label)}</span>
        <span class="count">${counts[label]}</span>
        <button class="del" data-label="${escapeHtml(label)}">Remove</button>
      `;
      classList.appendChild(row);
    });
    runBtn.disabled = labels.length < 2;
    if(labels.length < 2){
      setStatus('Add at least 2 labels before recognizing.');
    }
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  classList.addEventListener('click', (e) => {
    const btn = e.target.closest('.del');
    if(!btn) return;
    const label = btn.dataset.label;
    classifier.clearClass(label);
    delete counts[label];
    renderClassList();
    setStatus(`Removed "${label}".`);
  });

  function captureOnce(label){
    const embedding = getEmbedding();
    classifier.addExample(embedding, label);
    counts[label] = (counts[label] || 0) + 1;
    renderClassList();
  }

  function startCapturing(){
    const label = labelInput.value.trim();
    if(!label){
      setStatus('Type a label first.');
      return;
    }
    if(!mobilenetModel){ return; }
    capturing = true;
    addBtn.textContent = 'Capturing…';
    captureOnce(label);
    captureTimer = setInterval(() => captureOnce(label), 220);
  }

  function stopCapturing(){
    if(!capturing) return;
    capturing = false;
    clearInterval(captureTimer);
    addBtn.textContent = 'Hold to capture';
    setStatus(`Added examples for "${labelInput.value.trim()}".`);
  }

  ['mousedown','touchstart'].forEach(evt => {
    addBtn.addEventListener(evt, (e) => { e.preventDefault(); startCapturing(); });
  });
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(evt => {
    addBtn.addEventListener(evt, stopCapturing);
  });

  flipCam.addEventListener('click', async () => {
    const next = currentFacing === 'user' ? 'environment' : 'user';
    setStatus('Switching camera…');
    await startCamera(next);
    setStatus('Ready.');
  });

  async function predictLoop(){
    if(!running) return;
    if(classifier.getNumClasses() >= 2){
      const embedding = getEmbedding();
      const result = await classifier.predictClass(embedding, 10);
      embedding.dispose();
      const top = result.label;
      const conf = result.confidences[top];
      if(conf >= CONFIDENCE_THRESHOLD){
        predictPill.classList.add('show');
        predictLabel.textContent = top;
        predictConf.textContent = Math.round(conf * 100) + '% confident';
      } else {
        predictPill.classList.add('show');
        predictLabel.textContent = 'Not sure';
        predictConf.textContent = 'try a different angle';
      }
    }
    runTimer = setTimeout(predictLoop, 260);
  }

  runBtn.addEventListener('click', () => {
    running = !running;
    if(running){
      runBtn.textContent = 'Stop recognizing';
      runBtn.classList.add('active');
      setStatus('Recognizing…');
      predictLoop();
    } else {
      runBtn.textContent = 'Start recognizing';
      runBtn.classList.remove('active');
      predictPill.classList.remove('show');
      clearTimeout(runTimer);
      setStatus('Stopped.');
    }
  });

  exportBtn.addEventListener('click', () => {
    if(!classifier || classifier.getNumClasses() === 0){
      setStatus('Nothing to export yet.');
      return;
    }
    const dataset = classifier.getClassifierDataset();
    const out = {};
    Object.keys(dataset).forEach(label => {
      const t = dataset[label];
      out[label] = { data: Array.from(t.dataSync()), shape: t.shape };
    });
    const blob = new Blob([JSON.stringify(out)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'my-vision-training-data.json';
    a.click();
    URL.revokeObjectURL(url);
    setStatus('Training data exported.');
  });

  importBtnLabel.addEventListener('click', () => importFile.click());
  importFile.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    try{
      const parsed = JSON.parse(text);
      const dataset = {};
      Object.keys(parsed).forEach(label => {
        const { data, shape } = parsed[label];
        dataset[label] = tf.tensor(data, shape);
        counts[label] = shape[0];
      });
      classifier.setClassifierDataset(dataset);
      renderClassList();
      setStatus('Training data imported.');
    }catch(err){
      console.error(err);
      setStatus('Could not read that file.');
    }
    importFile.value = '';
  });

  init();
})();
</script>

</body>
</html>
